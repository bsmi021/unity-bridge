[pytest]
# Pytest configuration for Unity Bridge MCP v2.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    integration: Integration tests requiring Unity running
    slow: Slow-running tests
    asyncio: Async tests using asyncio

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=. --cov-report=html --cov-report=term

# Minimum Python version
minversion = 3.10

# Log configuration
log_cli = false
log_cli_level = INFO
log_file = tests/test_output.log
log_file_level = DEBUG

# Timeout for tests (prevents hanging)
timeout = 300

# Ignore patterns
norecursedirs = .git .venv venv node_modules __pycache__ *.egg-info
